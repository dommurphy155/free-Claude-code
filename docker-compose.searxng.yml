version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=ClaudeCode Search
    networks:
      - search-net
    mem_limit: 256m
    cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: searxng-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - search-net
    mem_limit: 64m

volumes:
  redis-data:

networks:
  search-net:
    driver: bridge
